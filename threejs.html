<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>threejs</title>
    <!-- <link rel="stylesheet" href="css/style.css"> -->
    <!-- swamiho - Prachi -->
    <!-- I want to have a static cube. The text is wrapped around the inside of the cube. 
    It appears that a projector is put within the cube, and when the projector moves, the text distorts. -->

<style>

body { 
  margin:0; 
  font-family: Arial; 
  background:#111; 
  color:white; 
  overflow-x:hidden;
}

#landingCanvas { 
  position:fixed; 
  top:0; left:0; 
  width:100%; 
  height:100vh; 
  z-index:0;
}

nav { 
  position:fixed; 
  top:0; left:0; 
  width:60px; 
  height:100%; 
  background: rgba(0,0,0,0.8); 
  display:flex; 
  flex-direction:column; 
  justify-content:center; 
  z-index:10;
}

nav ul { 
  list-style:none; 
  margin:0; 
  padding:0;
}

nav ul li { 
  margin:15px 0; 
  text-align:center;
}

nav ul li a { 
  text-decoration:none;
  color:white; 
  font-weight:bold; 
  writing-mode:vertical-rl; 
  transform:rotate(180deg); 
  font-size:12px; 
  transition:color 0.3s;
}

nav ul li a:hover { 
  color:#ff6347;
}

section {
  width:100%; 
  min-height:100vh; 
  margin-left:60px; 
  padding:80px 20px; 
  display:flex; 
  justify-content:center; 
  align-items:center; 
  border-bottom:1px solid #222; 
  flex-direction:column; 
  text-align:center; 
  background: rgba(0,0,0,0.1);
}

#landingText { 
  position:relative; 
  z-index:1; 
  text-align:center; 
  color:white;
}

#landingText h1 { 
  font-size:60px; 
  letter-spacing:6px;
}

#landingText p { 
  margin-top:10px; 
  opacity:0.7;
  }

</style>
</head>
<body>

<nav>
  <ul>
    <li><a href="#landing">Home</a></li>
    <li><a href="#section1">Page 1</a></li>
    <li><a href="#section2">Page 2</a></li>
    <li><a href="#section3">Page 3</a></li>
    <li><a href="#section4">Page 4</a></li>
  </ul>
</nav>

<section id="landing">
  <div id="landingText">
    <h1>ANAMORPHOSIS</h1>
    <p>Distortion that resolves from a specific viewpoint</p>
  </div>
  <canvas id="landingCanvas"></canvas>
</section>

<section id="section1"><h2>Page 1</h2></section>
<section id="section2"><h2>Page 2</h2></section>
<section id="section3"><h2>Page 3</h2></section>
<section id="section4"><h2>Page 4</h2></section>


<!-- script -->
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(20,20,20);
camera.lookAt(0,0,0);

const canvas = document.getElementById('landingCanvas');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

// Lights
scene.add(new THREE.AmbientLight(0x404040));
scene.add(new THREE.DirectionalLight(0xffffff,1));

// Stars
const starCount = 100;
const starPositions = [];
for(let i=0;i<starCount;i++){
  starPositions.push(new THREE.Vector3(
    (Math.random()-0.5)*50,
    (Math.random()-0.5)*50,
    (Math.random()-0.5)*50
  ));
}

// Points
const starGeometry = new THREE.BufferGeometry().setFromPoints(starPositions);
const stars = new THREE.Points(starGeometry, new THREE.PointsMaterial({color:0xffffff, size:1}));
scene.add(stars);

// Lines connecting stars dynamically
const lineMaterial = new THREE.LineBasicMaterial({color:0xffffff, opacity:0.3, transparent:true});
let lineMesh;
function updateLines(){
  const linePositions = [];
  for(let i=0;i<starCount;i++){
    for(let j=i+1;j<starCount;j++){
      const d = starPositions[i].distanceTo(starPositions[j]);
      if(d<10){
        linePositions.push(
          starPositions[i].x, starPositions[i].y, starPositions[i].z,
          starPositions[j].x, starPositions[j].y, starPositions[j].z
        );
      }
    }
  }
  if(lineMesh) scene.remove(lineMesh);
  const lineGeometry = new THREE.BufferGeometry();
  lineGeometry.setAttribute('position', new THREE.Float32BufferAttribute(linePositions,3));
  lineMesh = new THREE.LineSegments(lineGeometry, lineMaterial);
  scene.add(lineMesh);
}

// Mouse movement
let mouseX=0, mouseY=0;
document.addEventListener('mousemove', e=>{
  mouseX = (e.clientX/window.innerWidth - 0.5);
  mouseY = (e.clientY/window.innerHeight - 0.5);
});

// Animate
function animate(){
  requestAnimationFrame(animate);
  // Rotate star network slowly
  for(let i=0;i<starCount;i++){
    starPositions[i].x += Math.sin(i*0.1+Date.now()*0.0001)*0.001;
    starPositions[i].y += Math.cos(i*0.1+Date.now()*0.0001)*0.001;
  }
  starGeometry.setFromPoints(starPositions);
  updateLines();

  camera.position.x = 20 + mouseX*10;
  camera.position.y = 20 + mouseY*5;
  camera.position.z = 20 - mouseY*10;
  camera.lookAt(0,0,0);

  renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Smooth scroll
document.querySelectorAll('nav a').forEach(link=>{
  link.addEventListener('click', function(e){
    e.preventDefault();
    const targetId = this.getAttribute('href').substring(1);
    const target = document.getElementById(targetId);
    const bodyRect = document.body.getBoundingClientRect().top;
    const elemRect = target.getBoundingClientRect().top;
    window.scrollTo({top: elemRect - bodyRect, behavior:'smooth'});
  });
});
</script>
</body>
</html>
